name: Build Programs

on:
    workflow_call:
        inputs:
            git_ref:
                type: string
            rust:
                type: string
            solana:
                type: string
    workflow_dispatch:
        inputs:
            git_ref:
                description: Commit hash, branch, or tag to build
                default: main
                required: true
                type: string
            rust:
                description: Rust version
                default: 1.83.0
                required: true
                type: string
            solana:
                description: Solana version
                default: 2.2.1
                required: true
                type: string

env:
    CACHE: true

jobs:
    build_programs:
        name: Build
        runs-on: ubuntu-latest
        steps:
            - name: Git checkout
              uses: actions/checkout@v4
              with:
                  ref: ${{ inputs.git_ref || github.sha }}

            - name: Load environment variables
              run: |
                  # Allowlist instead of a blanket `cat .github/.env >> "$GITHUB_ENV"` so a
                  # PR-editable key in `.github/.env` cannot inject arbitrary env vars into
                  # subsequent steps.
                  grep -E '^(CARGO_TERM_COLOR|RUST_VERSION|SOLANA_VERSION|SOLANA_VERIFY_VERSION|SOLANA_VERIFY_BUILD_VERSION|PROGRAMS)=' .github/.env >> "$GITHUB_ENV"

            - name: Install Rust
              uses: metaplex-foundation/actions/install-rust@v1
              with:
                  toolchain: ${{ inputs.rust || env.RUST_VERSION }}

            - name: Install Solana
              uses: metaplex-foundation/actions/install-solana@v1
              with:
                  version: ${{ inputs.solana || env.SOLANA_VERSION }}
                  cache: ${{ env.CACHE }}

            - name: Cache program dependencies
              if: env.CACHE == 'true'
              uses: metaplex-foundation/actions/cache-programs@v1

            - name: Install solana-verify
              uses: metaplex-foundation/actions/install-solana-verify@v1
              with:
                  version: ${{ env.SOLANA_VERIFY_VERSION }}

            - name: Build mpl-core (verified)
              uses: metaplex-foundation/actions/verified-build@v1
              with:
                  library-name: mpl_core_program
                  package: mpl-core-program
                  # Verified-build toolchain version (SOLANA_VERIFY_BUILD_VERSION in
                  # .github/.env). Pinned to 3.1.14 = platform-tools v1.52, the newest
                  # official image; mpl-core's native tool is v1.53 but no v1.53 image
                  # exists yet. The action resolves it to a digest-pinned image via
                  # solana-verify-base-images.json.
                  solana-version: ${{ env.SOLANA_VERIFY_BUILD_VERSION }}
                  output-dir: programs/.bin

            - name: Dump external program binaries
              shell: bash
              run: |
                  ./configs/scripts/program/dump.sh ./programs/.bin
                  ./configs/scripts/program/dump_oracle_example.sh ./programs/.bin

            - name: Sanitize Ref
              id: sanitize
              shell: bash
              run: |
                  REF="${{ inputs.git_ref }}"
                  if [ -z "$REF" ]; then
                    REF="default"
                  fi
                  SANITIZED=${REF//\//-}
                  echo "sanitized=$SANITIZED" >> "$GITHUB_OUTPUT"

            - name: Upload program builds
              uses: actions/upload-artifact@v4
              with:
                  name: program-builds-${{ steps.sanitize.outputs.sanitized }}
                  # First wildcard ensures exported paths are consistently under the programs folder.
                  path: ./program*/.bin/*.so
                  include-hidden-files: true
                  if-no-files-found: error
