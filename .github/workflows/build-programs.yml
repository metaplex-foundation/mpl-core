name: Build Programs

on:
    workflow_call:
        inputs:
            git_ref:
                type: string
    workflow_dispatch:
        inputs:
            git_ref:
                description: Commit hash, branch, or tag to build
                default: main
                required: true
                type: string

jobs:
    build_programs:
        name: Build
        runs-on: ubuntu-latest
        env:
            CACHE: true
        steps:
            - name: Git checkout
              uses: actions/checkout@v4
              with:
                  ref: ${{ inputs.git_ref }}

            - name: Load environment variables
              run: cat .github/.env >> $GITHUB_ENV

            - name: Install Rust
              uses: metaplex-foundation/actions/install-rust@v1
              with:
                  toolchain: ${{ env.RUST_VERSION }}

            - name: Install Solana
              uses: metaplex-foundation/actions/install-solana@v1
              with:
                  version: ${{ env.SOLANA_VERSION }}
                  cache: ${{ env.CACHE }}

            # `solana-verify` transitively depends on `hidapi` (via
            # `solana-remote-wallet`), which links against `libudev` on Linux.
            # GitHub's `ubuntu-latest` runners do not ship `libudev-dev` by default,
            # so the `cargo install` step below fails with a pkg-config error
            # unless we install it first.
            - name: Install libudev (required by solana-verify)
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libudev-dev pkg-config

            # `solana-verify build` runs in a deterministic docker container so that
            # the resulting .so hash matches a remote rebuild of the same commit.
            # This is the canonical build for both CI artifacts and on-chain
            # deployments. See the Solana verified-builds guide for context:
            # https://solana.com/developers/guides/advanced/verified-builds
            - name: Install Solana Verify
              run: cargo install solana-verify --locked --version "${SOLANA_VERIFY_VERSION}"

            - name: Build programs
              shell: bash
              working-directory: configs/scripts/program
              run: ./build.sh
              env:
                  PROGRAMS: ${{ env.PROGRAMS }}

            - name: Sanitize Ref
              id: sanitize
              shell: bash
              run: |
                  REF="${{ inputs.git_ref }}"
                  if [ -z "$REF" ]; then
                    REF="default"
                  fi
                  SANITIZED=${REF//\//-}
                  echo "sanitized=$SANITIZED" >> "$GITHUB_OUTPUT"

            - name: Upload program builds
              uses: actions/upload-artifact@v4
              with:
                  name: program-builds-${{ steps.sanitize.outputs.sanitized }}
                  # The leading `program*` wildcard is intentional: upload-artifact@v4
                  # strips the longest non-wildcard prefix from each file's path when
                  # storing the artifact. Using `./programs/.bin/*.so` would flatten
                  # the artifact (files land at the repo root on download), breaking
                  # downstream jobs (test-*, deploy-program, create-release) that
                  # expect the `programs/.bin/` layout. The `program*` wildcard forces
                  # the common prefix back to `./`, preserving `programs/.bin/` in
                  # the extracted artifact.
                  path: ./program*/.bin/*.so
                  include-hidden-files: true
                  if-no-files-found: error
