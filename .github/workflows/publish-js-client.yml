name: Publish JS Client

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Release tag (release/genesis@0.9.2) or commit to publish from
        required: false
        type: string
        default: ''
      bump:
        description: Version bump
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease
          - prepatch
          - preminor
          - premajor
      tag:
        description: NPM Tag (and preid for pre-releases)
        required: true
        type: string
        default: latest
      create_release:
        description: Create a GitHub release
        required: true
        type: boolean
        default: true

env:
  CACHE: true

jobs:
  check_tag:
    name: "Check tag"
    runs-on: ubuntu-latest
    outputs:
      type: ${{ steps.set_type.outputs.type }}
    steps:
      - name: Check tag
        id: set_type
        run: |
          if [[ "${{ inputs.git_ref }}" =~ ^release/genesis@* ]]; then
            echo type="release" >> $GITHUB_OUTPUT
          else
            echo type="ref" >> $GITHUB_OUTPUT
          fi

  build_programs:
    name: Programs
    uses: ./.github/workflows/build-programs.yml
    secrets: inherit
    needs: check_tag
    if: needs.check_tag.outputs.type == 'ref'
    with:
      git_ref: ${{ inputs.git_ref }}

  test_js:
    name: JS client
    needs: [build_programs, check_tag]
    uses: ./.github/workflows/test-js-client.yml
    secrets: inherit
    if: needs.check_tag.outputs.type == 'ref'
    with:
      git_ref: ${{ inputs.git_ref }}

  publish_js:
    name: JS client / Publish
    runs-on: ubuntu-latest
    needs: [check_tag, test_js]
    if: |
      always()
      && (needs.test_js.result == 'success' || needs.test_js.result == 'skipped')
    permissions:
      contents: write
      packages: write
      pull-requests: write
      id-token: write
    steps:
      - name: Git checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref || github.ref }}

      - name: Load environment variables
        run: cat .github/.env >> $GITHUB_ENV

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.9.0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install npm >= 11.5.1
        run: npm install -g "npm@>=11.5.1"

      - name: Install dependencies
        uses: metaplex-foundation/actions/install-node-dependencies@v1
        with:
          folder: ./clients/js
          cache: ${{ env.CACHE }}
          key: clients-js

      - name: Build
        working-directory: ./clients/js
        run: pnpm build

      - name: Bump
        id: bump
        working-directory: ./clients/js
        run: |
          if [ "${{ startsWith(inputs.bump, 'pre') }}" == "true" ]; then
            pnpm version ${{ inputs.bump }} --preid ${{ inputs.tag }} --no-git-tag-version
          else
            pnpm version ${{ inputs.bump }} --no-git-tag-version
          fi
          echo "new_version=$(pnpm pkg get version | sed 's/"//g')" >> $GITHUB_OUTPUT

      - name: Publish
        working-directory: ./clients/js
        run: npm publish --access public --tag ${{ inputs.tag }}

      - name: Create release pull request
        if: ${{ github.event.inputs.create_release == 'true' }}
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore: release JS client v${{ steps.bump.outputs.new_version }}'
          branch: release/js-client-v${{ steps.bump.outputs.new_version }}
          title: 'chore: release JS client v${{ steps.bump.outputs.new_version }}'
          body: |
            ## Summary
            - publish-js-client workflow bumped the package to `${{ steps.bump.outputs.new_version }}`
            - once merged, run the release workflow to tag `js@v${{ steps.bump.outputs.new_version }}`
          labels: release

  deploy_js_docs:
    name: JS client / Deploy docs
    if: ${{ github.event.inputs.create_release == 'true' }}
    runs-on: ubuntu-latest
    needs: publish_js
    environment:
      name: js-client-documentation
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Git checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref || github.ref }}

      - name: Load environment variables
        run: cat .github/.env >> $GITHUB_ENV

      - name: Deploy to Vercel
        id: deploy
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        working-directory: ./clients/js
        run: echo "url=$(vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }})" | tee $GITHUB_OUTPUT
