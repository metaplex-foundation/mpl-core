name: Verify Program

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Release tag, commit hash, or branch that was deployed
        required: true
        type: string
      program:
        description: Program
        required: true
        default: core
        type: choice
        options:
          - core
      cluster:
        description: Cluster environment
        required: true
        default: mainnet-beta
        type: choice
        options:
          - mainnet-beta

env:
  CACHE: true

jobs:
  verify_program:
    name: Program / Verify
    runs-on: ubuntu-latest-16-cores
    permissions:
      contents: read
    steps:
      - name: Git checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}

      - name: Load environment variables
        run: cat .github/.env >> $GITHUB_ENV

      - name: Install Linux build deps
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config

      - name: Install Rust
        uses: metaplex-foundation/actions/install-rust@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install Solana
        uses: metaplex-foundation/actions/install-solana@v1
        with:
          version: ${{ env.DEPLOY_SOLANA_VERSION }}
          cache: ${{ env.CACHE }}

      - name: Install Solana Verify
        run: cargo install solana-verify --locked --version "${SOLANA_VERIFY_VERSION}"

      - name: Set RPC
        run: |
          if [ "${{ inputs.cluster }}" == "mainnet-beta" ]; then
            echo RPC=${{ secrets.MAINNET_RPC }} >> $GITHUB_ENV
          else
            echo "Invalid cluster: ${{ inputs.cluster }}"
            exit 1
          fi

      - name: Identify Program
        run: |
          PROGRAM_NAME="mpl_${{ inputs.program }}"
          echo PROGRAM_NAME="${PROGRAM_NAME}" >> $GITHUB_ENV
          echo LIBRARY_NAME="${PROGRAM_NAME}_program" >> $GITHUB_ENV
          echo ${{ secrets.CORE_ID }} > ./program-id.json
          echo ${{ secrets.CORE_DEPLOY_KEY }} > ./deployer-key.json

      - name: Upload verified-build PDA
        run: |
          PROGRAM_ID="$(solana-keygen pubkey ./program-id.json)"
          COMMIT_HASH="$(git rev-parse HEAD)"

          solana-verify verify-from-repo \
            --current-dir \
            --program-id "${PROGRAM_ID}" \
            --url "${RPC}" \
            --keypair ./deployer-key.json \
            --library-name "${LIBRARY_NAME}" \
            --mount-path . \
            --commit-hash "${COMMIT_HASH}" \
            --skip-prompt \
            https://github.com/metaplex-foundation/mpl-core.git

      - name: Submit remote verification job
        run: |
          PROGRAM_ID="$(solana-keygen pubkey ./program-id.json)"
          UPLOADER="$(solana-keygen pubkey ./deployer-key.json)"

          solana-verify remote submit-job \
            --url "${RPC}" \
            --program-id "${PROGRAM_ID}" \
            --uploader "${UPLOADER}"

      - name: Clean up signer files
        if: always()
        run: rm -f ./deployer-key.json ./program-id.json
